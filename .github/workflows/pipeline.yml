name: Tourism Package Prediction MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: 3.10
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:

# =====================================
# JOB 1: Code Quality
# =====================================
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8
        pip install -r tourism_mlops/deployment/requirements.txt

    # Auto format instead of failing
    - name: Format Code
      run: |
        black tourism_mlops/
        isort tourism_mlops/

    - name: Lint Check
      run: |
        flake8 tourism_mlops/ --count --select=E9,F63,F7,F82 --show-source --statistics


# =====================================
# JOB 2: Data Pipeline
# =====================================
  data-pipeline:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn huggingface-hub

    - name: Run Data Pipeline
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        cd tourism_mlops/model_building
        python data_register.py
        python prep.py

    - name: Debug Files
      run: ls -R

    - name: Upload Data Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: prepared-data
        path: tourism_mlops/model_building/processed/


# =====================================
# JOB 3: Model Training
# =====================================
  model-training:
    runs-on: ubuntu-latest
    needs: data-pipeline

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install ML Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn xgboost mlflow huggingface-hub joblib

    - name: Download Data
      uses: actions/download-artifact@v4
      with:
        name: prepared-data
        path: tourism_mlops/model_building/

    - name: Train Model
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        cd tourism_mlops/model_building
        python model_training.py

    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: trained-models
        path: tourism_mlops/model_building/


# =====================================
# JOB 4: Model Validation
# =====================================
  model-validation:
    runs-on: ubuntu-latest
    needs: model-training

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn joblib

    - name: Download Model
      uses: actions/download-artifact@v4
      with:
        name: trained-models

    - name: Download Data
      uses: actions/download-artifact@v4
      with:
        name: prepared-data

    - name: Validate Model
      run: |
        python -c "
import joblib
import pandas as pd
from sklearn.metrics import accuracy_score

model = joblib.load('best_model.pkl')
X_test = pd.read_csv('X_test.csv')
y_test = pd.read_csv('y_test.csv').squeeze()

y_pred = model.predict(X_test)
acc = accuracy_score(y_test, y_pred)

print(f'Accuracy: {acc}')

assert acc > 0.65, 'Model accuracy too low'
print('✅ Validation Passed')
"


# =====================================
# JOB 5: Deployment
# =====================================
  deployment:
    runs-on: ubuntu-latest
    needs: model-validation
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install huggingface-hub

    - name: Download Model
      uses: actions/download-artifact@v4
      with:
        name: trained-models

    - name: Deploy
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        cd tourism_mlops/deployment
        python deploy_to_hf_space.py

    - name: Success
      run: echo "🚀 Deployment Successful"


# =====================================
# JOB 6: Cleanup
# =====================================
  cleanup:
    runs-on: ubuntu-latest
    needs: deployment
    if: always()

    steps:
    - name: Done
      run: |
        echo "🎉 Pipeline Completed Successfully"
